name: deployment
on:
  push:
    branches:
      -main
  pull_request:
    branches:
      -main
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      - name: Set up JDK 
        uses: actions/setup-java@v1
        with:
          java-version: '17'
      - name: clean Maven build
        run: mvn clean
      - name: package Maven build
        run: mvn package
      - name: Upload JAR
        uses: actions/upload-artifact@v2
        with:
          name: artifact
          path: target/SeniorProject-0.0.1-SNAPSHOT.jar
  deploy:
    needs: build
    name: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Download JAR
        uses: actions/download-artifact@v2
        with:
          name: artifact
      - name: Deploy to EB
        uses: einaregilsson/beanstalk-deploy@v13
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          use_existing_version_if_available: false
          application_name: weddingRental-test
          environment_name: WeddingRental-test-env
          version_label: ${{github.SHA}}
          region: us-east-1
          deployment_package: SeniorProject-0.0.1-SNAPSHOT.jar
